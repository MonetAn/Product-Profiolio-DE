name: db-backup

# Ежедневный бэкап Supabase Postgres + хранение как artifact (90 дней по умолчанию).
# Это страховка на случай, если мак выключен и launchd не отрабатывает.
#
# Требуемые secrets в репозитории (Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL          — connection string без пароля (можно session pooler)
#   SUPABASE_DB_PASSWORD     — пароль БД из Supabase Dashboard
#
# Опционально:
#   SUPABASE_DB_DIRECT_URL   — direct connection для pg_dumpall --roles-only

on:
  schedule:
    - cron: "17 3 * * *"   # каждый день в 03:17 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Supabase = Postgres 17; ubuntu postgresql-client = 16 → pg_dump version mismatch.
      - name: Install PostgreSQL 17 client (pg_dump)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check required secrets
        run: |
          missing=""
          [ -z "${{ secrets.SUPABASE_DB_URL }}" ] && missing="${missing} SUPABASE_DB_URL"
          [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ] && missing="${missing} SUPABASE_DB_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing repository secrets:$missing"
            echo "Add them in Settings → Secrets → Actions."
            echo "SUPABASE_DB_URL = postgres pooler URL from .env.local (NOT VITE_SUPABASE_URL)."
            exit 1
          fi
          echo "Secrets OK (SUPABASE_DB_URL + SUPABASE_DB_PASSWORD)"

      - name: Run backup script
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_DIRECT_URL: ${{ secrets.SUPABASE_DB_DIRECT_URL }}
          PG_DUMP: /usr/lib/postgresql/17/bin/pg_dump
          PG_DUMPALL: /usr/lib/postgresql/17/bin/pg_dumpall
          BACKUPS_DIR: backups
          BACKUPS_KEEP_LAST: "1"
        run: node scripts/db-backup.mjs

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backups/
          retention-days: 90
          if-no-files-found: error
